spring.application.name=riskmanager

# Database configuration (Defaults to local MySQL, override with env vars for Azure)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/riskdb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Optional, accessible at /h2-console)
spring.h2.console.enabled=true

# Thymeleaf config
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# File Upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
