<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PORTAL RISIKO - System Changelog</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <!-- DataTables CSS & JS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <!-- Flatpickr CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 250px;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .profile-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .menu-item {
            padding: 12px 20px; color: var(--text-muted); text-decoration: none; display: block; font-weight: 500;
        }
        .menu-item:hover, .menu-item.active { background: #f8f9fa; color: var(--primary-blue); border-left: 4px solid var(--primary-yellow); }
        .main-content { flex: 1; padding: 20px 40px; background: white; }
        
        .card {
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            background: #fdfdfd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background-color: #f8f9fa;
            color: var(--primary-blue);
        }
        .badge-action {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            background-color: #6c757d;
        }
        .badge-create { background-color: #28a745; }
        .badge-delete { background-color: #dc3545; }
        .badge-edit { background-color: #ffc107; color: #333; }
        .badge-approve { background-color: #17a2b8; }
        .badge-reject { background-color: #343a40; }
        .badge-request { background-color: #6610f2; }
        .badge-submit { background-color: #fd7e14; }
        
        .filter-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-blue);
        }
        .filter-input {
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            min-width: 220px;
            transition: border-color 0.2s;
        }
        .filter-input:focus {
            border-color: var(--primary-yellow);
            outline: none;
        }
        
        /* Highlight DataTables Search */
        .dataTables_filter input {
            padding: 8px 12px;
            border: 2px solid var(--primary-blue);
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .dataTables_filter input:focus {
            border-color: var(--primary-yellow);
            box-shadow: 0 0 5px rgba(255, 193, 7, 0.4);
        }
        .dataTables_filter label {
            font-weight: bold;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div style="padding: 0 20px 20px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; margin-bottom: 20px;">
                <img th:src="@{/img/logo.png}" alt="Logo" style="width: 40px; height: auto;">
                <div style="font-weight: 700; color: var(--primary-blue); font-size: 14px; line-height: 1.2;">
                    Dana Pensiun<br>PPIP-PUSRI
                </div>
            </div>
            <div class="profile-section">
                <div style="width: 50px; height: 50px; border-radius: 50%; background: #ddd; display: flex; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0;">
                    <img th:if="${session.loggedInUser != null and session.loggedInUser.fotoProfil != null}" th:src="@{'/uploads/' + ${session.loggedInUser.fotoProfil}}" style="width:100%; height:100%; object-fit:cover;">
                    <span th:unless="${session.loggedInUser != null and session.loggedInUser.fotoProfil != null}" style="color:#888; font-size:24px;">👤</span>
                </div>
                <div>
                    <div style="font-size:12px; color:var(--text-muted);">Selamat datang</div>
                    <div style="font-weight:600; font-size:14px; margin-top:2px; color:var(--primary-blue);" th:text="${session.loggedInUser != null ? session.loggedInUser.nama : 'Unknown User'}"></div>
                    <div style="font-weight:600; font-size:13px; color:var(--text-muted);" th:text="${session.loggedInUser != null ? '(' + session.loggedInUser.badgeId + ')' : '(Guest)'}"></div>
                </div>
            </div>
            <div style="padding: 0 20px 20px 20px; border-bottom: 1px solid #eee;">
                <small style="color:var(--text-muted)" th:text="${session.loggedInUser != null ? session.loggedInUser.departemen : 'Unknown Dept'}"></small><br>
                <small style="color:var(--primary-yellow); font-weight:bold;">Role: <span th:text="${session.loggedInUser != null ? session.loggedInUser.role : 'None'}"></span></small>
            </div>
            <a th:href="@{/dashboard}" class="menu-item">Dashboard</a>
            <div style="padding: 12px 20px; font-weight:600; color:#333;">RISIKO</div>
            
            <a th:if="${session.loggedInUser != null and session.loggedInUser.role == 'Admin'}" th:href="@{/admin}" class="menu-item" style="padding-left: 40px; color: #dc3545;">
                ⚙️ Admin Panel
            </a>
            
            <a th:if="${session.loggedInUser != null and session.loggedInUser.role == 'Admin'}" th:href="@{/admin/changelog}" class="menu-item active" style="padding-left: 40px; color: #dc3545;">
                📜 System Changelog
            </a>

            <a th:if="${session.loggedInUser.role != 'RiskOwner'}" th:href="@{/identifikasi}" class="menu-item" style="padding-left: 40px; display: flex; justify-content: space-between; align-items: center;">
                <span>Identifikasi Risiko</span>
                <span th:if="${hasIdentifikasiNotif}" style="background-color: red; color: white; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">!</span>
            </a>
            <a th:if="${session.loggedInUser.role != 'RiskOwner'}" th:href="@{/pengendalian}" class="menu-item" style="padding-left: 40px; display: flex; justify-content: space-between; align-items: center;">
                <span>Pengendalian Risiko</span>
                <span th:if="${hasPengendalianNotif}" style="background-color: red; color: white; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">!</span>
            </a>
            <a th:href="@{/report}" class="menu-item" style="padding-left: 40px; display: flex; justify-content: space-between; align-items: center;">
                <span>Report</span>
                <span th:if="${hasReportNotif}" style="background-color: red; color: white; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">!</span>
            </a>
            
            <a th:href="@{/logout}" class="menu-item" style="margin-top: 40px; color: #dc3545; border-top: 1px solid #eee;" onclick="return confirm('Apakah Anda yakin ingin log out?');">Log Out</a>
        </div>
        
        <div class="main-content">
            <h2 style="color: var(--primary-blue); margin-top: 0;">System Changelog</h2>
            
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0;">Log Aktivitas Sistem</h3>
                </div>
                
                <div class="filter-container">
                    <div class="filter-group">
                        <label>Filter Aksi</label>
                        <select id="filterAction" class="filter-input">
                            <option value="">Semua Aksi</option>
                            <option value="CREATE">CREATE</option>
                            <option value="EDIT">EDIT</option>
                            <option value="DELETE">DELETE</option>
                            <option value="APPROVE">APPROVE</option>
                            <option value="REJECT">REJECT</option>
                            <option value="REQUEST">REQUEST</option>
                            <option value="SUBMIT">SUBMIT</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Filter Tanggal</label>
                        <input type="text" id="filterDate" class="filter-input" placeholder="Pilih rentang tanggal...">
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table id="logTable">
                        <thead>
                            <tr>
                                <th>Waktu</th>
                                <th>User (Badge ID)</th>
                                <th>Aksi</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${logs}">
                                <td th:text="${#temporals.format(log.timestamp, 'dd MMM yyyy HH:mm:ss')}"></td>
                                <td th:text="${log.actor}"></td>
                                <td>
                                    <span th:classappend="${
                                        #strings.containsIgnoreCase(log.actionType, 'CREATE') ? 'badge-create' :
                                        #strings.containsIgnoreCase(log.actionType, 'DELETE') ? 'badge-delete' :
                                        #strings.containsIgnoreCase(log.actionType, 'EDIT') ? 'badge-edit' :
                                        #strings.containsIgnoreCase(log.actionType, 'APPROVE') ? 'badge-approve' :
                                        #strings.containsIgnoreCase(log.actionType, 'REJECT') ? 'badge-reject' :
                                        #strings.containsIgnoreCase(log.actionType, 'REQUEST') ? 'badge-request' :
                                        #strings.containsIgnoreCase(log.actionType, 'SUBMIT') ? 'badge-submit' : ''}" 
                                        class="badge-action" th:text="${log.actionType}"></span>
                                </td>
                                <td th:text="${log.description}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>
    <script>
        $(document).ready(function() {
            var table = $('#logTable').DataTable({
                "pageLength": 20,
                "lengthMenu": [20, 50, 100],
                "order": [ [0, "desc"] ], // Sort by Waktu descending
                "language": {
                    "search": "Cari Log:"
                }
            });

            // Initialize Flatpickr for Date Range
            flatpickr("#filterDate", {
                mode: "range",
                dateFormat: "d M Y", // e.g. 10 Jul 2026
                onChange: function(selectedDates, dateStr, instance) {
                    if (selectedDates.length === 2 || selectedDates.length === 0) {
                        // Custom search function to filter based on date range
                        $.fn.dataTable.ext.search.push(
                            function(settings, data, dataIndex) {
                                if (selectedDates.length === 0) return true;
                                
                                // Parse the table date
                                var tableDateStr = data[0]; // Assuming Waktu is 1st column
                                // Data format: "10 Jul 2026 03:15:55"
                                // We extract just the date part for comparison
                                var dateParts = tableDateStr.split(' ');
                                if(dateParts.length >= 3) {
                                    var parsedDate = new Date(dateParts[1] + ' ' + dateParts[0] + ', ' + dateParts[2]);
                                    
                                    var start = selectedDates[0];
                                    var end = selectedDates[1];
                                    
                                    // Reset time for comparison
                                    start.setHours(0,0,0,0);
                                    end.setHours(23,59,59,999);
                                    
                                    return (parsedDate >= start && parsedDate <= end);
                                }
                                return true;
                            }
                        );
                        table.draw();
                        // Pop the custom function so it doesn't stack
                        $.fn.dataTable.ext.search.pop();
                    }
                }
            });

            $('#filterAction').on('change', function() {
                table.column(2).search(this.value).draw();
            });
        });
    </script>
</body>
</html>
